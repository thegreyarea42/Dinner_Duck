name: dinner_duck
description: "A privacy-focused, shared grocery list and recipe manager built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  html: ^0.15.4
  share_plus: ^10.1.0
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  wakelock_plus: ^1.2.8
  flutter_tts: ^4.2.2
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  multicast_dns: ^0.3.3
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  network_info_plus: ^7.0.0
  fluttertoast: ^9.0.0
  nsd: ^4.1.0
  bonsoir: ^6.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  nfc_manager: ^4.1.1
  ndef_record: ^1.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/
